services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: psa-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI (http://localhost:15672 — guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  whisper-worker:
    build:
      context: ./whisper_service
    container_name: psa-whisper-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      WHISPER_QUEUE: whisper.requests
      WHISPER_MODEL: base        # tiny(75MB) | base(145MB) | small(465MB) | large-v3(3GB)
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE: int8
    volumes:
      - whisper_models:/root/.cache/huggingface

  tts-worker:
    build:
      context: ./tts_service
    container_name: psa-tts-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      TTS_QUEUE: tts.requests
      TTS_LANG: tr               # gTTS dil kodu
      TTS_SAMPLE_RATE: "22050"

  symptom-worker:
    build:
      context: ./symptom_service
    container_name: psa-symptom-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      SYMPTOM_QUEUE: symptom.check
      LOOKBACK_DAYS: "0"
    volumes:
      - symptom_data:/data

  report-worker:
    build:
      context: ./report_service
    container_name: psa-report-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      REPORT_QUEUE: report.requests
      # SMTP — kendi değerlerinizi girin veya .env dosyası kullanın
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: ""
      SMTP_TO: ""
      SMTP_CC: ""

volumes:
  rabbitmq_data:
  whisper_models:
  symptom_data:
